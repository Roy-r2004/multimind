databases:
  - name: multiai-db
    databaseName: multiai
    user: multiai
    plan: free

services:
  - type: web
    name: multiai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: multiai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_APP_NAME
        value: MultiAI
      - key: OPENROUTER_SITE_URL
        fromService:
          type: web
          name: multiai-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PUBLIC_APP_URL
        fromService:
          type: web
          name: multiai-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        value: https://multiai-web.onrender.com

  - type: web
    name: multiai-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: BACKEND_PROXY_TARGET
        fromService:
          type: web
          name: multiai-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_API_URL
        value: /api/v1
