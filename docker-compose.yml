services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: multiai
      POSTGRES_PASSWORD: multiai
      POSTGRES_DB: multiai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiai -d multiai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://multiai:multiai@postgres:5432/multiai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: http://localhost:3080,http://127.0.0.1:3080
      PUBLIC_APP_URL: http://localhost:3080

      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: http://localhost:3080
      OPENROUTER_APP_NAME: MultiAI

      SOURCE_DISCOVERY_PROVIDER: ${SOURCE_DISCOVERY_PROVIDER:-serper}

      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SERPER_SEARCH_BASE_URL: ${SERPER_SEARCH_BASE_URL:-https://google.serper.dev/search}
      SERPER_SEARCH_TIMEOUT_SECONDS: ${SERPER_SEARCH_TIMEOUT_SECONDS:-10}
      SERPER_SEARCH_RESULTS_PER_QUERY: ${SERPER_SEARCH_RESULTS_PER_QUERY:-10}
      SERPER_SEARCH_MAX_QUERIES_PER_DISCOVERY: ${SERPER_SEARCH_MAX_QUERIES_PER_DISCOVERY:-4}

      SOURCE_RETRIEVAL_USER_AGENT: ${SOURCE_RETRIEVAL_USER_AGENT:-MultiMindSourceRetrieval/1.0 (+https://multimind.local/source-retrieval)}
      SOURCE_RETRIEVAL_CONNECT_TIMEOUT_SECONDS: ${SOURCE_RETRIEVAL_CONNECT_TIMEOUT_SECONDS:-5}
      SOURCE_RETRIEVAL_TIMEOUT_SECONDS: ${SOURCE_RETRIEVAL_TIMEOUT_SECONDS:-15}
      SOURCE_RETRIEVAL_MAX_REDIRECTS: ${SOURCE_RETRIEVAL_MAX_REDIRECTS:-5}
      SOURCE_RETRIEVAL_MAX_BYTES: ${SOURCE_RETRIEVAL_MAX_BYTES:-2097152}
      SOURCE_RETRIEVAL_ALLOWED_PORTS: ${SOURCE_RETRIEVAL_ALLOWED_PORTS:-80,443}
      SOURCE_RETRIEVAL_ROBOTS_POLICY: ${SOURCE_RETRIEVAL_ROBOTS_POLICY:-respect}
      SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_COVERAGE_CELL: ${SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_COVERAGE_CELL:-10}
      SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_EXECUTION: ${SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_EXECUTION:-150}

      FACILITY_EXTRACTION_ENABLED: ${FACILITY_EXTRACTION_ENABLED:-true}
      FACILITY_EXTRACTION_MODEL: ${FACILITY_EXTRACTION_MODEL:-gpt-4.1}
      FACILITY_EXTRACTION_MAX_DOCUMENT_CHARACTERS: ${FACILITY_EXTRACTION_MAX_DOCUMENT_CHARACTERS:-200000}
      FACILITY_EXTRACTION_CHUNK_CHARACTERS: ${FACILITY_EXTRACTION_CHUNK_CHARACTERS:-12000}
      FACILITY_EXTRACTION_CHUNK_OVERLAP_CHARACTERS: ${FACILITY_EXTRACTION_CHUNK_OVERLAP_CHARACTERS:-500}
      FACILITY_EXTRACTION_MAX_CHUNKS_PER_DOCUMENT: ${FACILITY_EXTRACTION_MAX_CHUNKS_PER_DOCUMENT:-20}
      FACILITY_EXTRACTION_MAX_DOCUMENTS_PER_EXECUTION: ${FACILITY_EXTRACTION_MAX_DOCUMENTS_PER_EXECUTION:-50}
      FACILITY_EXTRACTION_MAX_CHUNKS_PER_EXECUTION: ${FACILITY_EXTRACTION_MAX_CHUNKS_PER_EXECUTION:-120}
      FACILITY_EXTRACTION_MAX_CANDIDATES_PER_CHUNK: ${FACILITY_EXTRACTION_MAX_CANDIDATES_PER_CHUNK:-25}
      FACILITY_EXTRACTION_MAX_CANDIDATES_PER_DOCUMENT: ${FACILITY_EXTRACTION_MAX_CANDIDATES_PER_DOCUMENT:-100}
      FACILITY_EXTRACTION_TIMEOUT_SECONDS: ${FACILITY_EXTRACTION_TIMEOUT_SECONDS:-60}
      FACILITY_EXTRACTION_MAX_ATTEMPTS: ${FACILITY_EXTRACTION_MAX_ATTEMPTS:-2}
      FACILITY_EXTRACTION_MAX_EVIDENCE_QUOTE_CHARACTERS: ${FACILITY_EXTRACTION_MAX_EVIDENCE_QUOTE_CHARACTERS:-1000}

      FACILITY_PUBLICATION_ENABLED: ${FACILITY_PUBLICATION_ENABLED:-true}
      FACILITY_PUBLICATION_MIN_CONFIDENCE: ${FACILITY_PUBLICATION_MIN_CONFIDENCE:-0.55}
      FACILITY_PUBLICATION_MAX_CANDIDATES_PER_EXECUTION: ${FACILITY_PUBLICATION_MAX_CANDIDATES_PER_EXECUTION:-300}

      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      BRAVE_SEARCH_BASE_URL: ${BRAVE_SEARCH_BASE_URL:-https://api.search.brave.com/res/v1/web/search}
      BRAVE_SEARCH_TIMEOUT_SECONDS: ${BRAVE_SEARCH_TIMEOUT_SECONDS:-20}
      BRAVE_SEARCH_RESULTS_PER_QUERY: ${BRAVE_SEARCH_RESULTS_PER_QUERY:-10}
      BRAVE_SEARCH_MAX_QUERIES_PER_DISCOVERY: ${BRAVE_SEARCH_MAX_QUERIES_PER_DISCOVERY:-6}

      TRANSCRIPTION_ENABLED: ${TRANSCRIPTION_ENABLED:-true}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-large-v3-turbo}
      TRANSCRIPTION_DEVICE: ${TRANSCRIPTION_DEVICE:-cpu}
      TRANSCRIPTION_COMPUTE_TYPE: ${TRANSCRIPTION_COMPUTE_TYPE:-float16}
      TRANSCRIPTION_CPU_MODEL: ${TRANSCRIPTION_CPU_MODEL:-medium}
      TRANSCRIPTION_CPU_COMPUTE_TYPE: ${TRANSCRIPTION_CPU_COMPUTE_TYPE:-int8}
      TRANSCRIPTION_STRICT_DEVICE: ${TRANSCRIPTION_STRICT_DEVICE:-false}
      TRANSCRIPTION_MAX_DURATION_SECONDS: ${TRANSCRIPTION_MAX_DURATION_SECONDS:-600}
      TRANSCRIPTION_MAX_UPLOAD_BYTES: ${TRANSCRIPTION_MAX_UPLOAD_BYTES:-26214400}
      TRANSCRIPTION_TIMEOUT_SECONDS: ${TRANSCRIPTION_TIMEOUT_SECONDS:-300}
      TRANSCRIPTION_TMP_DIR: ${TRANSCRIPTION_TMP_DIR:-/tmp/multimind-transcriptions}
      TRANSCRIPTION_CONCURRENCY: ${TRANSCRIPTION_CONCURRENCY:-1}
      TRANSCRIPTION_MODEL_CACHE_DIR: ${TRANSCRIPTION_MODEL_CACHE_DIR:-/models/whisper}
      HF_HOME: ${HF_HOME:-/models/whisper}
      TRANSCRIPTION_BEAM_SIZE: ${TRANSCRIPTION_BEAM_SIZE:-1}
      TRANSCRIPTION_VAD_FILTER: ${TRANSCRIPTION_VAD_FILTER:-true}
      TRANSCRIPTION_INITIAL_PROMPT: ${TRANSCRIPTION_INITIAL_PROMPT:-MultiMind, OpenRouter, Ollama, Claude, Gemini, GPT, RAG, orchestrator, scraper, blueprint, verdict, model set}
    volumes:
      - whisper_models:/models/whisper
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  scraping-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "app.scraping.worker.WorkerSettings"]

    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://multiai:multiai@postgres:5432/multiai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}

      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: http://localhost:3080
      OPENROUTER_APP_NAME: MultiAI

      SOURCE_DISCOVERY_PROVIDER: ${SOURCE_DISCOVERY_PROVIDER:-serper}

      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SERPER_SEARCH_BASE_URL: ${SERPER_SEARCH_BASE_URL:-https://google.serper.dev/search}
      SERPER_SEARCH_TIMEOUT_SECONDS: ${SERPER_SEARCH_TIMEOUT_SECONDS:-10}
      SERPER_SEARCH_RESULTS_PER_QUERY: ${SERPER_SEARCH_RESULTS_PER_QUERY:-10}
      SERPER_SEARCH_MAX_QUERIES_PER_DISCOVERY: ${SERPER_SEARCH_MAX_QUERIES_PER_DISCOVERY:-4}

      SOURCE_RETRIEVAL_USER_AGENT: ${SOURCE_RETRIEVAL_USER_AGENT:-MultiMindSourceRetrieval/1.0 (+https://multimind.local/source-retrieval)}
      SOURCE_RETRIEVAL_CONNECT_TIMEOUT_SECONDS: ${SOURCE_RETRIEVAL_CONNECT_TIMEOUT_SECONDS:-5}
      SOURCE_RETRIEVAL_TIMEOUT_SECONDS: ${SOURCE_RETRIEVAL_TIMEOUT_SECONDS:-15}
      SOURCE_RETRIEVAL_MAX_REDIRECTS: ${SOURCE_RETRIEVAL_MAX_REDIRECTS:-5}
      SOURCE_RETRIEVAL_MAX_BYTES: ${SOURCE_RETRIEVAL_MAX_BYTES:-2097152}
      SOURCE_RETRIEVAL_ALLOWED_PORTS: ${SOURCE_RETRIEVAL_ALLOWED_PORTS:-80,443}
      SOURCE_RETRIEVAL_ROBOTS_POLICY: ${SOURCE_RETRIEVAL_ROBOTS_POLICY:-respect}
      SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_COVERAGE_CELL: ${SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_COVERAGE_CELL:-10}
      SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_EXECUTION: ${SOURCE_RETRIEVAL_MAX_CANDIDATES_PER_EXECUTION:-150}

      FACILITY_EXTRACTION_ENABLED: ${FACILITY_EXTRACTION_ENABLED:-true}
      FACILITY_EXTRACTION_MODEL: ${FACILITY_EXTRACTION_MODEL:-gpt-4.1}
      FACILITY_EXTRACTION_MAX_DOCUMENT_CHARACTERS: ${FACILITY_EXTRACTION_MAX_DOCUMENT_CHARACTERS:-200000}
      FACILITY_EXTRACTION_CHUNK_CHARACTERS: ${FACILITY_EXTRACTION_CHUNK_CHARACTERS:-12000}
      FACILITY_EXTRACTION_CHUNK_OVERLAP_CHARACTERS: ${FACILITY_EXTRACTION_CHUNK_OVERLAP_CHARACTERS:-500}
      FACILITY_EXTRACTION_MAX_CHUNKS_PER_DOCUMENT: ${FACILITY_EXTRACTION_MAX_CHUNKS_PER_DOCUMENT:-20}
      FACILITY_EXTRACTION_MAX_DOCUMENTS_PER_EXECUTION: ${FACILITY_EXTRACTION_MAX_DOCUMENTS_PER_EXECUTION:-50}
      FACILITY_EXTRACTION_MAX_CHUNKS_PER_EXECUTION: ${FACILITY_EXTRACTION_MAX_CHUNKS_PER_EXECUTION:-120}
      FACILITY_EXTRACTION_MAX_CANDIDATES_PER_CHUNK: ${FACILITY_EXTRACTION_MAX_CANDIDATES_PER_CHUNK:-25}
      FACILITY_EXTRACTION_MAX_CANDIDATES_PER_DOCUMENT: ${FACILITY_EXTRACTION_MAX_CANDIDATES_PER_DOCUMENT:-100}
      FACILITY_EXTRACTION_TIMEOUT_SECONDS: ${FACILITY_EXTRACTION_TIMEOUT_SECONDS:-60}
      FACILITY_EXTRACTION_MAX_ATTEMPTS: ${FACILITY_EXTRACTION_MAX_ATTEMPTS:-2}
      FACILITY_EXTRACTION_MAX_EVIDENCE_QUOTE_CHARACTERS: ${FACILITY_EXTRACTION_MAX_EVIDENCE_QUOTE_CHARACTERS:-1000}

      FACILITY_PUBLICATION_ENABLED: ${FACILITY_PUBLICATION_ENABLED:-true}
      FACILITY_PUBLICATION_MIN_CONFIDENCE: ${FACILITY_PUBLICATION_MIN_CONFIDENCE:-0.55}
      FACILITY_PUBLICATION_MAX_CANDIDATES_PER_EXECUTION: ${FACILITY_PUBLICATION_MAX_CANDIDATES_PER_EXECUTION:-300}

      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      BRAVE_SEARCH_BASE_URL: ${BRAVE_SEARCH_BASE_URL:-https://api.search.brave.com/res/v1/web/search}
      BRAVE_SEARCH_TIMEOUT_SECONDS: ${BRAVE_SEARCH_TIMEOUT_SECONDS:-20}
      BRAVE_SEARCH_RESULTS_PER_QUERY: ${BRAVE_SEARCH_RESULTS_PER_QUERY:-10}
      BRAVE_SEARCH_MAX_QUERIES_PER_DISCOVERY: ${BRAVE_SEARCH_MAX_QUERIES_PER_DISCOVERY:-6}

      SCRAPING_MOCK_STEP_DELAY_MS: ${SCRAPING_MOCK_STEP_DELAY_MS:-600}
      SCRAPING_WORKER_CONCURRENCY: ${SCRAPING_WORKER_CONCURRENCY:-4}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from pathlib import Path; import sys; sys.exit(0 if b'arq' in Path('/proc/1/cmdline').read_bytes() else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3080:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      BACKEND_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  whisper_models:
