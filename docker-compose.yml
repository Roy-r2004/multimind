services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: multiai
      POSTGRES_PASSWORD: multiai
      POSTGRES_DB: multiai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai:multiai@postgres:5432/multiai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      PUBLIC_APP_URL: http://localhost:5173
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
