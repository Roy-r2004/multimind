services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: multiai
      POSTGRES_PASSWORD: multiai
      POSTGRES_DB: multiai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiai -d multiai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://multiai:multiai@postgres:5432/multiai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: http://localhost:3080,http://127.0.0.1:3080
      PUBLIC_APP_URL: http://localhost:3080
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: http://localhost:3080
      OPENROUTER_APP_NAME: MultiAI
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  scraping-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["arq", "app.scraping.worker.WorkerSettings"]
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://multiai:multiai@postgres:5432/multiai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      OPENROUTER_API_KEY: ""
      SCRAPING_MOCK_STEP_DELAY_MS: ${SCRAPING_MOCK_STEP_DELAY_MS:-600}
      SCRAPING_WORKER_CONCURRENCY: ${SCRAPING_WORKER_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from pathlib import Path; import sys; sys.exit(0 if b'arq' in Path('/proc/1/cmdline').read_bytes() else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3080:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      BACKEND_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data: