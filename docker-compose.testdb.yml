      DATABASE_URL: postgresql+asyncpg://multiai:multiai@postgres:5432/multiai_scraping_test
      SOURCE_DISCOVERY_PROVIDER: serper
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      SCRAPING_MOCK_STEP_DELAY_MS: "600"
